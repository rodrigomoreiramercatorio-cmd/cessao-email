<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cessão Mercatório</title>

<style>
body { font-family: Arial; background:#f5f7fa; padding:20px; }
.container { max-width:900px; margin:auto; background:white; padding:25px; border-radius:10px; }
h2 { text-align:center; }
.bloco { margin-top:18px; }
label { font-size:12px; font-weight:bold; }
input, select {
  width:100%; padding:7px; margin-top:3px; margin-bottom:8px;
  border-radius:5px; border:1px solid #ccc; font-size:12px;
}
.linha { display:flex; gap:10px; align-items:end; }
.small { width:110px; }
button {
  padding:10px; width:100%; background:#002060; color:white;
  border:none; border-radius:6px; cursor:pointer; margin-top:8px;
}
.output {
  background:#f1f1f1; padding:12px; border-radius:6px;
  font-family:Verdana; font-size:14px; white-space:pre-wrap;
}
</style>
</head>

<body>
<div class="container">

<h2>Cessão</h2>

<div class="bloco">
<h3>Dados da Cessão</h3>

<div class="linha">
  <div class="small">
    <label>Nº Caso</label>
    <input id="numero" type="number" min="1" max="999">
  </div>
  <div>
    <label>Caso</label>
    <input id="caso">
  </div>
</div>

<div class="linha">
  <div class="small">
    <label>Data</label>
    <input id="data" type="date">
  </div>
  <div>
    <label>Dia</label>
    <input id="dia" disabled>
  </div>
</div>

</div>

<div class="bloco">
<h3>Credor</h3>

<label>Nome</label>
<input id="credor">

<label>CPF/CNPJ</label>
<input id="cpf">

<label>O que estamos pagando com a transação:</label>
<select id="tipo">
<option>Credor</option>
<option>Honorário Contratual</option>
<option>Honorário de Sucumbência</option>
<option>Broker/Comissão</option>
<option>Correios</option>
<option>Diligência</option>
<option>Envelope</option>
<option>Escritura Pública</option>
<option>Impressão</option>
<option>Reconhecimento de Firma</option>
<option>Transporte</option>
</select>
</div>

<div class="bloco">
<h3>Pagamento</h3>

<label>Valor</label>
<input id="valor" type="number" step="0.01">

<label>Data prevista</label>
<input id="data2" type="date">

<div class="linha">
  <div>
    <label>Hora</label>
    <select id="hora"><option></option></select>
  </div>
  <div>
    <label>Min</label>
    <select id="min">
      <option></option>
      <option>00</option>
      <option>15</option>
      <option>30</option>
      <option>45</option>
    </select>
  </div>
</div>

</div>

<div class="bloco">
<h3>Recebedor</h3>

<label>Quem vai receber é a mesma pessoa acima?</label>
<select id="mesmo">
<option>Sim</option>
<option>Não</option>
</select>

<label>Nome Completo de quem receberá o valor</label>
<input id="recebedor">

<label>CPF/CNPJ de quem receberá o valor</label>
<input id="cpf2">
</div>

<div class="bloco">
<h3>Banco</h3>

<input id="bancoCod" placeholder="Código do banco">
<input id="bancoNome" placeholder="Nome do banco">
<input id="agencia" placeholder="Agência">
<input id="conta" placeholder="Conta">
<input id="tipoConta" placeholder="Tipo da conta">
<input id="pix" placeholder="Chave Pix">

<select id="tipoPix">
<option>CPF/CNPJ</option>
<option>Email</option>
<option>Telefone</option>
<option>Aleatória</option>
</select>

<select id="print">
<option>Sim</option>
<option>Não</option>
</select>
</div>

<div class="bloco">
<h3>Preview</h3>

<div id="assunto" class="output"></div><br>
<div id="corpo" class="output"></div>

<button onclick="copiarAssunto()">Copiar Assunto</button>
<button onclick="copiarCorpo()">Copiar Corpo</button>
</div>

</div>

<script>

// HORAS
for(let i=5;i<=23;i++){
 let h=i.toString().padStart(2,'0');
 document.getElementById("hora").innerHTML += `<option>${h}</option>`;
}

// FUNÇÕES
function nome(n){
 return n.toLowerCase().trim().split(" ")
 .map(p=>["da","de","do","das","dos"].includes(p)?p:p.charAt(0).toUpperCase()+p.slice(1))
 .join(" ");
}

function valor(v){
 return parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function mascara(v){
 v=v.replace(/\D/g,"");
 if(v.length<=11){
   return v.replace(/(\d{3})(\d)/,"$1.$2")
           .replace(/(\d{3})(\d)/,"$1.$2")
           .replace(/(\d{3})(\d{1,2})$/,"$1-$2");
 } else {
   return v.replace(/^(\d{2})(\d)/,"$1.$2")
           .replace(/^(\d{2})\.(\d{3})(\d)/,"$1.$2.$3")
           .replace(/\.(\d{3})(\d)/,".$1/$2")
           .replace(/(\d{4})(\d)/,"$1-$2");
 }
}

const bancos={
 "033":"Banco Santander S.A.",
 "001":"Banco do Brasil S.A.",
 "104":"Caixa Econômica Federal",
 "341":"Itaú Unibanco S.A.",
 "237":"Bradesco S.A.",
 "260":"Nu Pagamentos S.A."
};

// DATA + DIA
let ultimoDia = "";

function atualizar(){

 let d=data.value;
 if(!d) return;

 let obj=new Date(d);
 let diaSemana=obj.toLocaleDateString('pt-BR',{weekday:'long'});
 diaSemana=diaSemana.charAt(0).toUpperCase()+diaSemana.slice(1);

 let hoje=new Date().toISOString().split('T')[0];

 if(d===hoje){
   dia.value=`Hoje - ${diaSemana}`;
 } else {
   dia.value=diaSemana;
 }

 if((obj.getDay()==0||obj.getDay()==6) && ultimoDia!==d){
   alert("⚠️ Data em fim de semana");
 }
 ultimoDia=d;

 let numeroFormatado=String(numero.value||"").padStart(3,'0');
 let ano=d.substring(0,4);
 let dBR=d.split("-").reverse().join("/");

 let casoFormatado=nome(caso.value||"");
 let credorFormatado=nome(credor.value||"");

 cpf.value=mascara(cpf.value);
 cpf2.value=mascara(cpf2.value);

 if(mesmo.value==="Sim"){
   recebedor.value=credorFormatado;
   cpf2.value=cpf.value;
 } else {
   if(recebedor.value===credorFormatado) recebedor.value="";
   if(cpf2.value===cpf.value) cpf2.value="";
 }

 let horario = (hora.value && min.value) ? `${hora.value}:${min.value}` : "";

 let assunto=`${ano}.${numeroFormatado} - ${casoFormatado} - ${dBR}`;

 let corpo=`Prezados, haverá uma cessão prevista para ${diaSemana} dia ${dBR}.
Seguem os dados para que a programação seja realizada.


Dados para Organização


Pagamento Credor

1. O nome completo do credor do precatório: ${credorFormatado}
2. CPF do credor do precatório: ${cpf.value}
3. O que estamos pagando com a transação: ${tipo.value}
4. Valor do Pgto: R$ ${valor(valorInput.value)}
5. Data prevista de realização da cessão: ${data2.value.split("-").reverse().join("/")}
6. Horário previsto de realização da cessão: ${horario}
7. Nome Completo de quem receberá o valor: ${recebedor.value}
8. CPF de quem receberá o valor: ${cpf2.value}
9. Código do banco: ${bancoCod.value}
10. Nome do Banco: ${bancoNome.value}
11. Nº da Agência: ${agencia.value}
12. Nº da Conta: ${conta.value}
13. Tipo da Conta: ${tipoConta.value}
14. Chave Pix: ${pix.value}
15. Tipo da chave Pix: ${tipoPix.value}
16. Tirou Print dos dados para conferência no email: ${print.value}`;

 assunto.innerText=assunto;
 corpo.innerText=corpo;
}

// COPIAR
function copiarAssunto(){navigator.clipboard.writeText(assunto.innerText);}
function copiarCorpo(){navigator.clipboard.writeText(corpo.innerText);}

// EVENTOS
document.querySelectorAll("input,select").forEach(e=>e.addEventListener("input",atualizar));

bancoCod.oninput=()=>{ if(bancos[bancoCod.value]) bancoNome.value=bancos[bancoCod.value]; };

// INIT
window.onload=()=>{
 let hoje=new Date().toISOString().split('T')[0];
 data.value=hoje;
 data2.value=hoje;
 atualizar();
};

</script>

</body>
</html>
