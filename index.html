<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cessão Mercatório</title>

<style>
body { font-family: Arial; max-width: 800px; margin: auto; }
input { width: 100%; margin-bottom: 10px; padding: 8px; }
button { padding: 10px; font-size: 16px; cursor: pointer; }
.output { background: #f4f4f4; padding: 10px; white-space: pre-wrap; margin-top:10px;}
</style>
</head>

<body>

<h2>Preenchimento - Cessão</h2>

<label>Nº</label>
<input id="numero" type="number" required>

<label>Data da cessão</label>
<input id="data" type="date" required>

<label>Caso</label>
<input id="caso" type="text" required>

<label>Nome do credor</label>
<input id="credor" type="text" required>

<label>CPF</label>
<input id="cpf" type="text" required>

<label>Valor</label>
<input id="valor" type="number" step="0.01" required>

<button onclick="gerar()">Gerar texto</button>

<h3>Assunto</h3>
<div id="assunto" class="output"></div>

<h3>Corpo do email</h3>
<div id="corpo" class="output"></div>

<button onclick="copiar()">Copiar tudo</button>

<script>
function gerar() {
  let numero = String(document.getElementById("numero").value).padStart(3,'0');
  let data = document.getElementById("data").value;

  if (!data) {
    alert("Preencha a data");
    return;
  }

  let caso = document.getElementById("caso").value.trim();
  let credor = document.getElementById("credor").value.trim();
  let cpf = document.getElementById("cpf").value.trim();
  let valor = parseFloat(document.getElementById("valor").value || 0);

  let ano = data.substring(0,4);
  let dataBR = data.split("-").reverse().join("/");

  let emailReal = `${ano}.${numero}`;
  let assunto = `${emailReal} - ${caso} - ${dataBR}`;

  let valorFormatado = valor.toLocaleString('pt-BR', {minimumFractionDigits: 2});

  let corpo = `Prezados,

Haverá uma cessão prevista na data ${dataBR}.
Seguem os dados para programação.

Pagamento Credor

Nome: ${credor}
CPF: ${cpf}
Valor: R$ ${valorFormatado}

Favor anexar o print dos dados bancários para conferência.`;

  document.getElementById("assunto").innerText = assunto;
  document.getElementById("corpo").innerText = corpo;
}

function copiar() {
  let texto = document.getElementById("assunto").innerText + "\n\n" +
              document.getElementById("corpo").innerText;

  navigator.clipboard.writeText(texto);
  alert("Copiado!");
}
</script>

...código que te mandei...
</script>

</body>
</body>
</html>
